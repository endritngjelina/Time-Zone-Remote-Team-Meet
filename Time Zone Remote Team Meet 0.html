<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeSync Pro - Global Team Scheduler</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        .header h1 {
            color: white;
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            font-weight: 300;
        }

        .main-panel {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            animation: fadeInUp 1s ease-out;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 20px;
            margin-bottom: 40px;
            align-items: end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .input-field, .select-field {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .input-field:focus, .select-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: #f7fafc;
            color: #4a5568;
            border: 2px solid #e2e8f0;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
        }

        .team-members {
            margin-bottom: 30px;
        }

        .member-card {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 16px;
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.5);
            animation: slideInRight 0.6s ease-out;
        }

        .member-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .member-info h3 {
            color: #2d3748;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .member-info p {
            color: #718096;
            font-size: 0.9rem;
        }

        .time-display {
            text-align: right;
        }

        .time-display .current-time {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3748;
        }

        .time-display .date {
            font-size: 0.8rem;
            color: #718096;
        }

        .timeline-container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .timeline-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 30px;
        }

        .timeline-header h2 {
            color: #2d3748;
            font-size: 1.5rem;
        }

        .timeline {
            position: relative;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .hours-row {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .hour-cell {
            min-width: 60px;
            text-align: center;
            font-size: 0.8rem;
            color: #718096;
            font-weight: 500;
        }

        .member-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            position: relative;
        }

        .member-label {
            width: 140px;
            font-weight: 600;
            color: #2d3748;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .timeline-cells {
            display: flex;
            flex: 1;
        }

        .time-cell {
            min-width: 60px;
            height: 40px;
            border: 1px solid #e2e8f0;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .time-cell.working-hours {
            background: linear-gradient(135deg, #68d391 0%, #38b2ac 100%);
            border-color: #38a169;
        }

        .time-cell.overlap {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #5a67d8;
        }

        .time-cell.non-working {
            background: #f7fafc;
            border-color: #e2e8f0;
        }

        .time-cell.meeting {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
            border-color: #c05621;
            position: relative;
        }

        .time-cell:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .meeting-block {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
            border: 2px solid #c05621;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: move;
            box-shadow: 0 2px 8px rgba(237, 137, 54, 0.3);
        }

        .legend {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #718096;
            font-size: 0.9rem;
        }

        .meeting-form {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border: 2px dashed #cbd5e0;
        }

        .meeting-form h3 {
            color: #2d3748;
            margin-bottom: 15px;
        }

        .meeting-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: #48bb78;
            color: white;
            border-radius: 8px;
            font-weight: 500;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
        }

        .notification.show {
            transform: translateX(0);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .current-time-indicator {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e53e3e;
            z-index: 100;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .member-card {
                grid-template-columns: auto 1fr;
                gap: 12px;
            }
            
            .timeline {
                font-size: 0.8rem;
            }
            
            .member-label {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ TimeSync Pro</h1>
            <p>Advanced Time-Zone Visualizer for Global Remote Teams</p>
        </div>

        <div class="main-panel">
            <div class="controls">
                <div class="input-group">
                    <label for="memberName">Team Member Name</label>
                    <input type="text" id="memberName" class="input-field" placeholder="Enter name..." />
                </div>
                <div class="input-group">
                    <label for="timezone">Time Zone</label>
                    <select id="timezone" class="select-field">
                        <option value="America/New_York">New York (EST)</option>
                        <option value="America/Chicago">Chicago (CST)</option>
                        <option value="America/Denver">Denver (MST)</option>
                        <option value="America/Los_Angeles">Los Angeles (PST)</option>
                        <option value="Europe/London">London (GMT)</option>
                        <option value="Europe/Paris">Paris (CET)</option>
                        <option value="Europe/Berlin">Berlin (CET)</option>
                        <option value="Europe/Moscow">Moscow (MSK)</option>
                        <option value="Asia/Tokyo">Tokyo (JST)</option>
                        <option value="Asia/Shanghai">Shanghai (CST)</option>
                        <option value="Asia/Mumbai">Mumbai (IST)</option>
                        <option value="Asia/Singapore">Singapore (SGT)</option>
                        <option value="Australia/Sydney">Sydney (AEDT)</option>
                        <option value="Australia/Melbourne">Melbourne (AEDT)</option>
                        <option value="Pacific/Auckland">Auckland (NZDT)</option>
                    </select>
                </div>
                <button id="addMember" class="btn-primary">Add Member</button>
            </div>

            <div class="team-members" id="teamMembers"></div>

            <div class="timeline-container">
                <div class="timeline-header">
                    <h2>📅 Team Availability Timeline</h2>
                    <div>
                        <button id="prevDay" class="btn-secondary">← Prev Day</button>
                        <button id="nextDay" class="btn-secondary">Next Day →</button>
                    </div>
                </div>
                <div class="timeline" id="timeline"></div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: linear-gradient(135deg, #68d391 0%, #38b2ac 100%);"></div>
                        <span>Working Hours</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                        <span>Team Overlap</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);"></div>
                        <span>Scheduled Meeting</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #f7fafc;"></div>
                        <span>Non-Working Hours</span>
                    </div>
                </div>
            </div>

            <div class="meeting-form">
                <h3>🚀 Quick Schedule Meeting</h3>
                <div class="meeting-form-row">
                    <div class="input-group">
                        <label>Meeting Title</label>
                        <input type="text" id="meetingTitle" class="input-field" placeholder="Team standup, design review..." />
                    </div>
                    <div class="input-group">
                        <label>Duration (hours)</label>
                        <select id="meetingDuration" class="select-field">
                            <option value="0.5">30 minutes</option>
                            <option value="1">1 hour</option>
                            <option value="1.5">1.5 hours</option>
                            <option value="2">2 hours</option>
                            <option value="3">3 hours</option>
                        </select>
                    </div>
                    <button id="findBestTime" class="btn-primary">Find Best Time</button>
                </div>
            </div>

            <div class="stats-panel">
                <div class="stat-card">
                    <div class="stat-value" id="totalMembers">0</div>
                    <div class="stat-label">Team Members</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="overlapHours">0</div>
                    <div class="stat-label">Overlap Hours</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="timeZones">0</div>
                    <div class="stat-label">Time Zones</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="scheduledMeetings">0</div>
                    <div class="stat-label">Meetings Today</div>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        class TimezoneVisualizer {
            constructor() {
                this.members = [];
                this.meetings = [];
                this.currentDate = new Date();
                this.draggedMeeting = null;
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.addSampleData();
                this.render();
                this.updateTimes();
                setInterval(() => this.updateTimes(), 60000); // Update every minute
            }

            setupEventListeners() {
                document.getElementById('addMember').addEventListener('click', () => this.addMember());
                document.getElementById('memberName').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addMember();
                });
                document.getElementById('findBestTime').addEventListener('click', () => this.findBestMeetingTime());
                document.getElementById('prevDay').addEventListener('click', () => this.changeDay(-1));
                document.getElementById('nextDay').addEventListener('click', () => this.changeDay(1));
            }

            addSampleData() {
                // Add some sample team members to showcase the tool
                const sampleMembers = [
                    { name: 'Sarah Chen', timezone: 'America/Los_Angeles', workStart: 9, workEnd: 17 },
                    { name: 'Marcus Johnson', timezone: 'America/New_York', workStart: 9, workEnd: 17 },
                    { name: 'Priya Patel', timezone: 'Asia/Mumbai', workStart: 9, workEnd: 17 }
                ];

                sampleMembers.forEach(member => {
                    this.members.push({
                        ...member,
                        id: Date.now() + Math.random(),
                        color: this.generateColor()
                    });
                });
            }

            addMember() {
                const name = document.getElementById('memberName').value.trim();
                const timezone = document.getElementById('timezone').value;

                if (!name) {
                    this.showNotification('Please enter a member name', 'error');
                    return;
                }

                const member = {
                    id: Date.now() + Math.random(),
                    name,
                    timezone,
                    workStart: 9,
                    workEnd: 17,
                    color: this.generateColor()
                };

                this.members.push(member);
                document.getElementById('memberName').value = '';
                this.render();
                this.showNotification(`${name} added to the team!`);
            }

            removeMember(id) {
                this.members = this.members.filter(m => m.id !== id);
                this.meetings = this.meetings.filter(m => !m.participants.includes(id));
                this.render();
                this.showNotification('Team member removed');
            }

            generateColor() {
                const colors = ['#667eea', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#6c5ce7', '#fd79a8', '#fdcb6e'];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            changeDay(direction) {
                this.currentDate.setDate(this.currentDate.getDate() + direction);
                this.render();
            }

            getTimeInTimezone(date, timezone) {
                return new Intl.DateTimeFormat('en-US', {
                    timeZone: timezone,
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                }).format(date);
            }

            getDateInTimezone(date, timezone) {
                return new Intl.DateTimeFormat('en-US', {
                    timeZone: timezone,
                    weekday: 'short',
                    month: 'short',
                    day: 'numeric'
                }).format(date);
            }

            isWorkingHour(hour, member) {
                return hour >= member.workStart && hour < member.workEnd;
            }

            calculateOverlapHours() {
                if (this.members.length < 2) return 0;
                
                let overlapCount = 0;
                for (let hour = 0; hour < 24; hour++) {
                    let workingMembers = 0;
                    this.members.forEach(member => {
                        const date = new Date(this.currentDate);
                        date.setHours(hour, 0, 0, 0);
                        
                        const memberTime = new Date(date.toLocaleString("en-US", { timeZone: member.timezone }));
                        const memberHour = memberTime.getHours();
                        
                        if (this.isWorkingHour(memberHour, member)) {
                            workingMembers++;
                        }
                    });
                    
                    if (workingMembers >= 2) {
                        overlapCount++;
                    }
                }
                return overlapCount;
            }

            findBestMeetingTime() {
                const title = document.getElementById('meetingTitle').value.trim();
                const duration = parseFloat(document.getElementById('meetingDuration').value);

                if (!title) {
                    this.showNotification('Please enter a meeting title', 'error');
                    return;
                }

                if (this.members.length < 2) {
                    this.showNotification('Add at least 2 team members to find optimal meeting times', 'error');
                    return;
                }

                const bestTimes = [];
                for (let hour = 0; hour <= 24 - duration; hour += 0.5) {
                    let workingMembers = 0;
                    let allCanAttend = true;

                    this.members.forEach(member => {
                        const date = new Date(this.currentDate);
                        date.setHours(Math.floor(hour), (hour % 1) * 60, 0, 0);
                        
                        const memberTime = new Date(date.toLocaleString("en-US", { timeZone: member.timezone }));
                        const memberHour = memberTime.getHours() + memberTime.getMinutes() / 60;
                        
                        if (this.isWorkingHour(memberHour, member) && this.isWorkingHour(memberHour + duration, member)) {
                            workingMembers++;
                        } else {
                            allCanAttend = false;
                        }
                    });

                    if (allCanAttend && workingMembers === this.members.length) {
                        bestTimes.push({ hour, score: workingMembers });
                    }
                }

                if (bestTimes.length > 0) {
                    const bestTime = bestTimes[0];
                    this.scheduleMeeting(title, bestTime.hour, duration);
                    this.showNotification(`Best meeting time found and scheduled: ${this.formatHour(bestTime.hour)}`);
                } else {
                    this.showNotification('No optimal time found for all members. Consider async communication.', 'warning');
                }
            }

            scheduleMeeting(title, startHour, duration) {
                const meeting = {
                    id: Date.now() + Math.random(),
                    title,
                    startHour,
                    duration,
                    date: new Date(this.currentDate),
                    participants: this.members.map(m => m.id)
                };

                this.meetings.push(meeting);
                this.render();
            }

            formatHour(hour) {
                const h = Math.floor(hour);
                const m = (hour % 1) * 60;
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
            }

            updateTimes() {
                this.members.forEach((member, index) => {
                    const timeDisplay = document.querySelector(`[data-member-id="${member.id}"] .current-time`);
                    const dateDisplay = document.querySelector(`[data-member-id="${member.id}"] .date`);
                    
                    if (timeDisplay && dateDisplay) {
                        const now = new Date();
                        timeDisplay.textContent = this.getTimeInTimezone(now, member.timezone);
                        dateDisplay.textContent = this.getDateInTimezone(now, member.timezone);
                    }
                });
            }

            renderMembers() {
                const container = document.getElementById('teamMembers');
                container.innerHTML = this.members.map(member => `
                    <div class="member-card" data-member-id="${member.id}">
                        <div class="avatar" style="background: ${member.color}">
                            ${member.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="member-info">
                            <h3>${member.name}</h3>
                            <p>${member.timezone.replace('_', ' ').split('/').pop()} • ${member.workStart}:00 - ${member.workEnd}:00</p>
                        </div>
                        <div class="time-display">
                            <div class="current-time">--:--</div>
                            <div class="date">Loading...</div>
                        </div>
                        <button class="btn-secondary" onclick="app.removeMember('${member.id}')">Remove</button>
                    </div>
                `).join('');
            }

            renderTimeline() {
                const timeline = document.getElementById('timeline');
                if (this.members.length === 0) {
                    timeline.innerHTML = '<p style="text-align: center; color: #718096; padding: 40px;">Add team members to see the timeline</p>';
                    return;
                }

                // Generate hour headers
                const hoursHtml = `
                    <div class="hours-row">
                        <div style="width: 140px;"></div>
                        ${Array.from({length: 24}, (_, i) => `
                            <div class="hour-cell">${this.formatHour(i)}</div>
                        `).join('')}
                    </div>
                `;

                // Generate member rows
                const memberRows = this.members.map(member => {
                    const cells = Array.from({length: 24}, (_, hour) => {
                        const date = new Date(this.currentDate);
                        date.setHours(hour, 0, 0, 0);
                        
                        const memberTime = new Date(date.toLocaleString("en-US", { timeZone: member.timezone }));
                        const memberHour = memberTime.getHours();
                        
                        const isWorking = this.isWorkingHour(memberHour, member);
                        const hasOverlap = this.calculateCellOverlap(hour) >= 2;
                        const hasMeeting = this.meetings.some(m => 
                            this.isSameDay(m.date, this.currentDate) && 
                            hour >= m.startHour && hour < m.startHour + m.duration &&
                            m.participants.includes(member.id)
                        );

                        let className = 'time-cell ';
                        if (hasMeeting) className += 'meeting';
                        else if (isWorking && hasOverlap) className += 'overlap';
                        else if (isWorking) className += 'working-hours';
                        else className += 'non-working';

                        return `<div class="${className}" data-hour="${hour}" data-member="${member.id}"></div>`;
                    }).join('');

                    return `
                        <div class="member-row">
                            <div class="member-label">${member.name}</div>
                            <div class="timeline-cells">${cells}</div>
                        </div>
                    `;
                }).join('');

                timeline.innerHTML = hoursHtml + memberRows;
                this.addCurrentTimeIndicator();
            }

            calculateCellOverlap(hour) {
                let workingCount = 0;
                this.members.forEach(member => {
                    const date = new Date(this.currentDate);
                    date.setHours(hour, 0, 0, 0);
                    
                    const memberTime = new Date(date.toLocaleString("en-US", { timeZone: member.timezone }));
                    const memberHour = memberTime.getHours();
                    
                    if (this.isWorkingHour(memberHour, member)) {
                        workingCount++;
                    }
                });
                return workingCount;
            }

            addCurrentTimeIndicator() {
                const now = new Date();
                if (this.isSameDay(now, this.currentDate)) {
                    const currentHour = now.getHours();
                    const currentMinute = now.getMinutes();
                    const hourOffset = currentHour + currentMinute / 60;
                    
                    const indicator = document.createElement('div');
                    indicator.className = 'current-time-indicator';
                    indicator.style.left = `${140 + (hourOffset * 60)}px`;
                    
                    const timeline = document.getElementById('timeline');
                    timeline.style.position = 'relative';
                    timeline.appendChild(indicator);
                }
            }

            isSameDay(date1, date2) {
                return date1.toDateString() === date2.toDateString();
            }

            updateStats() {
                document.getElementById('totalMembers').textContent = this.members.length;
                document.getElementById('overlapHours').textContent = this.calculateOverlapHours();
                document.getElementById('timeZones').textContent = new Set(this.members.map(m => m.timezone)).size;
                document.getElementById('scheduledMeetings').textContent = this.meetings.filter(m => 
                    this.isSameDay(m.date, this.currentDate)
                ).length;
            }

            render() {
                this.renderMembers();
                this.renderTimeline();
                this.updateStats();
                this.updateTimes();
            }

            showNotification(message, type = 'success') {
                const notification = document.getElementById('notification');
                notification.textContent = message;
                notification.className = `notification ${type} show`;
                
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 3000);
            }
        }

        // Global app instance
        const app = new TimezoneVisualizer();

        // Advanced features for productivity
        document.addEventListener('DOMContentLoaded', function() {
            // Add keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey || e.metaKey) {
                    switch(e.key) {
                        case 'n':
                            e.preventDefault();
                            document.getElementById('memberName').focus();
                            break;
                        case 'm':
                            e.preventDefault();
                            document.getElementById('meetingTitle').focus();
                            break;
                        case 'ArrowLeft':
                            e.preventDefault();
                            app.changeDay(-1);
                            break;
                        case 'ArrowRight':
                            e.preventDefault();
                            app.changeDay(1);
                            break;
                    }
                }
            });

            // Add drag and drop for meetings (advanced feature)
            let draggedElement = null;
            
            document.addEventListener('dragstart', function(e) {
                if (e.target.classList.contains('meeting-block')) {
                    draggedElement = e.target;
                    e.target.style.opacity = '0.5';
                }
            });

            document.addEventListener('dragend', function(e) {
                if (e.target.classList.contains('meeting-block')) {
                    e.target.style.opacity = '';
                    draggedElement = null;
                }
            });

            document.addEventListener('dragover', function(e) {
                e.preventDefault();
            });

            document.addEventListener('drop', function(e) {
                e.preventDefault();
                if (draggedElement && e.target.classList.contains('time-cell')) {
                    const newHour = parseInt(e.target.dataset.hour);
                    // Update meeting time logic would go here
                    app.showNotification('Meeting rescheduled!');
                }
            });

            // Add export functionality
            window.exportSchedule = function() {
                const scheduleData = {
                    date: app.currentDate.toISOString(),
                    members: app.members,
                    meetings: app.meetings,
                    stats: {
                        totalMembers: app.members.length,
                        overlapHours: app.calculateOverlapHours(),
                        timeZones: new Set(app.members.map(m => m.timezone)).size
                    }
                };

                const blob = new Blob([JSON.stringify(scheduleData, null, 2)], {
                    type: 'application/json'
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `team-schedule-${app.currentDate.toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                
                app.showNotification('Schedule exported successfully!');
            };

            // Add print functionality
            window.printSchedule = function() {
                const printContent = document.querySelector('.main-panel').cloneNode(true);
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                        <head>
                            <title>TimeSync Pro - Team Schedule</title>
                            <style>
                                body { font-family: Arial, sans-serif; margin: 20px; }
                                .timeline-container { page-break-inside: avoid; }
                                .member-card { margin-bottom: 10px; }
                                .controls, .meeting-form, .stats-panel { display: none; }
                                @media print { 
                                    .timeline { font-size: 12px; }
                                    .member-row { margin-bottom: 8px; }
                                }
                            </style>
                        </head>
                        <body>
                            <h1>TimeSync Pro - Team Schedule</h1>
                            <p>Generated on: ${new Date().toLocaleDateString()}</p>
                            ${printContent.innerHTML}
                        </body>
                    </html>
                `);
                printWindow.document.close();
                printWindow.print();
                
                app.showNotification('Schedule ready for printing!');
            };

            // Add floating action buttons for advanced features
            const floatingButtons = document.createElement('div');
            floatingButtons.style.cssText = `
                position: fixed;
                bottom: 30px;
                right: 30px;
                display: flex;
                flex-direction: column;
                gap: 15px;
                z-index: 1000;
            `;
            
            floatingButtons.innerHTML = `
                <button onclick="exportSchedule()" class="btn-primary" style="border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);" title="Export Schedule">
                    📊
                </button>
                <button onclick="printSchedule()" class="btn-primary" style="border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);" title="Print Schedule">
                    🖨️
                </button>
                <button onclick="app.render()" class="btn-primary" style="border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);" title="Refresh">
                    🔄
                </button>
            `;
            
            document.body.appendChild(floatingButtons);

            // Add tooltips for better UX
            const style = document.createElement('style');
            style.textContent = `
                [title]:hover::after {
                    content: attr(title);
                    position: absolute;
                    bottom: 100%;
                    left: 50%;
                    transform: translateX(-50%);
                    background: #2d3748;
                    color: white;
                    padding: 8px 12px;
                    border-radius: 6px;
                    font-size: 0.85rem;
                    white-space: nowrap;
                    z-index: 1001;
                    margin-bottom: 5px;
                }
                
                [title]:hover::before {
                    content: '';
                    position: absolute;
                    bottom: 100%;
                    left: 50%;
                    transform: translateX(-50%);
                    border: 5px solid transparent;
                    border-top-color: #2d3748;
                    z-index: 1001;
                }
            `;
            document.head.appendChild(style);

            // Add help modal
            const helpModal = document.createElement('div');
            helpModal.id = 'helpModal';
            helpModal.style.cssText = `
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.8);
                z-index: 2000;
                justify-content: center;
                align-items: center;
            `;
            
            helpModal.innerHTML = `
                <div style="background: white; padding: 40px; border-radius: 16px; max-width: 600px; max-height: 80vh; overflow-y: auto;">
                    <h2 style="margin-bottom: 20px; color: #2d3748;">⚡ TimeSync Pro - Quick Help</h2>
                    <div style="line-height: 1.6; color: #4a5568;">
                        <h3>🎯 Key Features:</h3>
                        <ul style="margin: 10px 0;">
                            <li><strong>Multi-timezone support:</strong> Add team members from different time zones</li>
                            <li><strong>Visual overlap detection:</strong> See when your team is available</li>
                            <li><strong>Smart meeting scheduler:</strong> Find optimal meeting times automatically</li>
                            <li><strong>Real-time updates:</strong> Current time indicators and live clocks</li>
                        </ul>
                        
                        <h3>⌨️ Keyboard Shortcuts:</h3>
                        <ul style="margin: 10px 0;">
                            <li><strong>Ctrl/Cmd + N:</strong> Focus on add member field</li>
                            <li><strong>Ctrl/Cmd + M:</strong> Focus on meeting title field</li>
                            <li><strong>Ctrl/Cmd + ←/→:</strong> Navigate days</li>
                        </ul>
                        
                        <h3>🎨 Color Legend:</h3>
                        <ul style="margin: 10px 0;">
                            <li><strong>Green:</strong> Individual working hours</li>
                            <li><strong>Purple:</strong> Team overlap (2+ members working)</li>
                            <li><strong>Orange:</strong> Scheduled meetings</li>
                            <li><strong>Gray:</strong> Non-working hours</li>
                        </ul>
                        
                        <h3>💡 Pro Tips:</h3>
                        <ul style="margin: 10px 0;">
                            <li>Use the export button to save team schedules</li>
                            <li>Print schedules for offline reference</li>
                            <li>Click "Find Best Time" for optimal meeting scheduling</li>
                            <li>Navigate between days to plan future meetings</li>
                        </ul>
                    </div>
                    <button onclick="document.getElementById('helpModal').style.display='none'" class="btn-primary" style="margin-top: 20px;">Got it!</button>
                </div>
            `;
            
            document.body.appendChild(helpModal);

            // Add help button
            const helpButton = document.createElement('button');
            helpButton.innerHTML = '❓';
            helpButton.className = 'btn-primary';
            helpButton.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 30px;
                border-radius: 50%;
                width: 56px;
                height: 56px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
                z-index: 1000;
            `;
            helpButton.title = 'Help & Shortcuts';
            helpButton.onclick = () => {
                helpModal.style.display = 'flex';
            };
            
            document.body.appendChild(helpButton);
        });
    </script>
</body>
</html>
